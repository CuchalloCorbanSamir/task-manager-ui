<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">

    <h2>Gestión de Tareas</h2>


    <button
      class="btn btn-primary"
      routerLink="/tasks/new">

      Nueva tarea

    </button>

  </div>

    <div class="row mb-3">

      <div class="col-md-6">

        <input
          type="text"
          class="form-control"
          placeholder="Buscar tarea..."
          [(ngModel)]="searchText">

      </div>

      <div class="col-md-6">

        <button
          class="btn btn-primary me-2"
          (click)="search()">

          Buscar

        </button>

        <button
          class="btn btn-secondary"
          (click)="clearSearch()">

          Limpiar

        </button>

      </div>
      <p
        class="mt-2"
        *ngIf="searchText">

        Resultados encontrados:
        {{ searchResults }}

      </p>

    </div>


  <div class="card">

    <div class="card-body">

      <table
        class="table table-striped table-hover">

        <thead>

          <tr>

            <th>ID</th>

            <th>Título</th>

            <th>Estado</th>

            <th>Acciones</th>

          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let task of tasks">

            <td>{{ task.id }}</td>

            <td>{{ task.title }}</td>

            <td>

              <span
                class="badge"
                [class.bg-success]="task.completed"
                [class.bg-warning]="!task.completed">

                {{ task.completed
                  ? 'Completada'
                  : 'Pendiente' }}

              </span>

            </td>

            <td>

              <button
                class="btn btn-sm btn-warning me-2"
                [routerLink]="[
                  '/tasks/edit',
                  task.id
                ]">

                Editar

              </button>

              <button
                class="btn btn-sm btn-danger"
                (click)="deleteTask(task.id)">

                Eliminar

              </button>

            </td>

          </tr>

        </tbody>

      </table>

      <div
        class="mt-3 d-flex
              justify-content-center
              align-items-center">

        <button
          class="btn btn-secondary me-2"
          (click)="previousPage()"
          [disabled]="currentPage === 0">

          Anterior

        </button>

        <span>

          Página
          {{ currentPage + 1 }}
          de
          {{ totalPages }}

        </span>

        <button
          class="btn btn-secondary ms-2"
          (click)="nextPage()"
          [disabled]="
            currentPage === totalPages - 1
          ">

          Siguiente

        </button>

      </div>

    </div>

  </div>

</div>
