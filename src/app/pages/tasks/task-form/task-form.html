<div class="container mt-4">

  <div class="card">

    <div class="card-header">

      <h3>

        {{ isEditMode
            ? 'Editar Tarea'
            : 'Nueva Tarea' }}

      </h3>

    </div>

    <div class="card-body">

      <form
        [formGroup]="taskForm"
        (ngSubmit)="onSubmit()">

        <div class="mb-3">

          <label class="form-label">

            Título

          </label>

          <input
            type="text"
            class="form-control"
            formControlName="title">

          <div
            class="text-danger mt-1"
            *ngIf="
              taskForm.get('title')
                ?.invalid &&
              taskForm.get('title')
                ?.touched">

            El título es obligatorio.

          </div>

        </div>

        <div class="form-check mb-3">

          <input
            type="checkbox"
            class="form-check-input"
            formControlName="completed">

          <label
            class="form-check-label">

            Completada

          </label>

        </div>

        <button
          type="submit"
          class="btn btn-success me-2">

          Guardar

        </button>

        <button
          type="button"
          class="btn btn-secondary"
          (click)="cancel()">

          Cancelar

        </button>

      </form>

    </div>

  </div>

</div>
