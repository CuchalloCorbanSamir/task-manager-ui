<div class="container mt-4">

  <div
    class="d-flex justify-content-between align-items-center mb-4">

    <h2>Dashboard</h2>

    <div>

      <button
        class="btn btn-primary me-2"
        routerLink="/tasks">

        Gestionar Tareas

      </button>

      <button
        class="btn btn-danger"
        (click)="logout()">

        Cerrar sesión

      </button>

    </div>

  </div>

  <div class="row">

    <div class="col-md-4">

      <div class="card text-center">

        <div class="card-body">

          <h5>Total Tareas</h5>

          <h1>

            {{ totalTasks }}

          </h1>

        </div>

      </div>

    </div>

    <div class="col-md-4">

      <div class="card text-center">

        <div class="card-body">

          <h5>Completadas</h5>

          <h1>

            {{ completedTasks }}

          </h1>

        </div>

      </div>

    </div>

    <div class="col-md-4">

      <div class="card text-center">

        <div class="card-body">

          <h5>Pendientes</h5>

          <h1>

            {{ pendingTasks }}

          </h1>

        </div>

      </div>

    </div>

  </div>

</div>
